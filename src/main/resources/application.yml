spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/smsdb
    username: YOUR_DB_USER
    password: YOUR_DB_PASSWORD
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # or validate / create / create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true


server:
  port: 8080